<div class="accesso-negato-container">
  <div class="error-content">
    <div class="error-icon">🚫</div>
    <h1>Accesso Negato 😅</h1>
    <p class="error-message">
      Oops! Qui non puoi entrare.<br>
      Solo chi ha il ruolo giusto può vedere questa pagina.<br>
      Se sei uno studente, vai nella tua area. Se sei docente, torna alla tua area.
    </p>
    <p class="error-details">
      Se pensi sia un errore, contatta il preside o prova a fare logout e login.
    </p>
    <div class="button-group">
      <button (click)="goHome()" class="btn btn-secondary">
        ← Torna all'accesso
      </button>
      <button (click)="logout()" class="btn btn-logout">
        Logout
      </button>
    </div>
  </div>
</div>
