<nav class="navbar">
  <div class="navbar-content">
    <h1>{{ title() }}</h1>
    <div class="nav-buttons">
      <span *ngIf="auth.isLoggedIn()" class="username">{{ auth.getUsername() }}</span>
      <button *ngIf="!auth.isLoggedIn()" (click)="login()" class="btn btn-login">Login</button>
      <button *ngIf="auth.isLoggedIn()" (click)="logout()" class="btn btn-logout">Logout</button>
    </div>
  </div>
</nav>
<main class="main-content">
  <div *ngIf="isLoading()" class="loading">
    <p>Caricamento in corso...</p>
    <p class="loading-subtitle">Inizializzazione Keycloak...</p>
  </div>
  <router-outlet *ngIf="!isLoading()" />
</main>
